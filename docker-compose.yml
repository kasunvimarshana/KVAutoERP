services:
  # ─────────────────────────────────────────────
  # Message Broker
  # ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: crud_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Product Service Database (MySQL)
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: crud_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: product_service
      MYSQL_USER: product_user
      MYSQL_PASSWORD: product_pass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # Inventory Service Database (MongoDB)
  # ─────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: crud_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Service A: Product Service (Laravel / PHP)
  # ─────────────────────────────────────────────
  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: crud_product_service
    environment:
      APP_NAME: "Product Service"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: product_service
      DB_USERNAME: product_user
      DB_PASSWORD: product_pass
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      INVENTORY_SERVICE_URL: http://inventory-service:3000
      QUEUE_CONNECTION: database
      CACHE_STORE: file
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - product_storage:/var/www/html/storage

  product-nginx:
    image: nginx:1.25-alpine
    container_name: crud_product_nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/product-service.conf:/etc/nginx/conf.d/default.conf:ro
      - ./product-service/public:/var/www/html/public:ro
    depends_on:
      - product-service

  # ─────────────────────────────────────────────
  # Service B: Inventory Service (Node.js)
  # ─────────────────────────────────────────────
  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: crud_inventory_service
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongodb:27017/inventory
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      NODE_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  rabbitmq_data:
  mysql_data:
  mongodb_data:
  product_storage:
