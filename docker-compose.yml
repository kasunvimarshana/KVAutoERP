version: '3.9'

networks:
  saas_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:

services:

  # ─── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: saas_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_USER: ${MYSQL_USER:-saas_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-saas_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redissecret} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── RabbitMQ ───────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: saas_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Auth Service ───────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: saas_auth
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${AUTH_APP_KEY}
      APP_URL: http://auth-service:8001
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: auth_db
      DB_USERNAME: auth_user
      DB_PASSWORD: ${AUTH_DB_PASSWORD:-authsecret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - ./services/auth-service:/var/www/html
    networks:
      - saas_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Tenant Service ─────────────────────────────────────────────────────────
  tenant-service:
    build:
      context: ./services/tenant-service
      dockerfile: Dockerfile
    container_name: saas_tenant
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${TENANT_APP_KEY}
      APP_URL: http://tenant-service:8002
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: tenant_db
      DB_USERNAME: tenant_user
      DB_PASSWORD: ${TENANT_DB_PASSWORD:-tenantsecret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - ./services/tenant-service:/var/www/html
    networks:
      - saas_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Inventory Service ──────────────────────────────────────────────────────
  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: saas_inventory
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${INVENTORY_APP_KEY}
      APP_URL: http://inventory-service:8003
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: inventory_db
      DB_USERNAME: inventory_user
      DB_PASSWORD: ${INVENTORY_DB_PASSWORD:-inventorysecret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      TENANT_SERVICE_URL: http://tenant-service:8002
      AUTH_SERVICE_URL: http://auth-service:8001
      MESSAGE_BROKER: ${MESSAGE_BROKER:-rabbitmq}
    volumes:
      - ./services/inventory-service:/var/www/html
    networks:
      - saas_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      tenant-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Order Service ──────────────────────────────────────────────────────────
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: saas_order
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${ORDER_APP_KEY}
      APP_URL: http://order-service:8004
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: order_db
      DB_USERNAME: order_user
      DB_PASSWORD: ${ORDER_DB_PASSWORD:-ordersecret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      TENANT_SERVICE_URL: http://tenant-service:8002
      INVENTORY_SERVICE_URL: http://inventory-service:8003
    volumes:
      - ./services/order-service:/var/www/html
    networks:
      - saas_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Notification Service ───────────────────────────────────────────────────
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: saas_notification
    restart: unless-stopped
    ports:
      - "8005:8005"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${NOTIFICATION_APP_KEY}
      APP_URL: http://notification-service:8005
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: notification_db
      DB_USERNAME: notification_user
      DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD:-notificationsecret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    volumes:
      - ./services/notification-service:/var/www/html
    networks:
      - saas_network
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── API Gateway ────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: saas_gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${GATEWAY_APP_KEY}
      APP_URL: http://api-gateway:8000
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:8001
      TENANT_SERVICE_URL: http://tenant-service:8002
      INVENTORY_SERVICE_URL: http://inventory-service:8003
      ORDER_SERVICE_URL: http://order-service:8004
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
    volumes:
      - ./services/api-gateway:/var/www/html
    networks:
      - saas_network
    depends_on:
      auth-service:
        condition: service_healthy
      tenant-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
        REACT_APP_ENV: ${APP_ENV:-production}
    container_name: saas_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
    networks:
      - saas_network
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: saas_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - saas_network
    depends_on:
      - api-gateway
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
