version: "3.9"

networks:
  saas_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:

services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: saas_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_USER: ${MYSQL_USER:-saas}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-saassecret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --max-connections=500

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-redissecret}

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: saas_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-saas}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitsecret}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-saas_vhost}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  # ─── API Gateway ─────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: saas_api_gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/api-gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./services/api-gateway/ssl:/etc/nginx/ssl:ro
      - ./docker/logs/nginx:/var/log/nginx
    networks:
      - saas_network
    depends_on:
      auth-service:
        condition: service_healthy
      tenant-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── Auth Service ─────────────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: saas_auth_service
    restart: unless-stopped
    environment:
      APP_NAME: "AuthService"
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${AUTH_APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${AUTH_SERVICE_URL:-http://auth-service}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${AUTH_DB_DATABASE:-auth_service_db}
      DB_USERNAME: ${MYSQL_USER:-saas}
      DB_PASSWORD: ${MYSQL_PASSWORD:-saassecret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-saas}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-rabbitsecret}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-saas_vhost}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: ${JWT_TTL:-60}
      PASSPORT_PERSONAL_ACCESS_CLIENT_ID: ${PASSPORT_PERSONAL_ACCESS_CLIENT_ID}
      PASSPORT_PERSONAL_ACCESS_CLIENT_SECRET: ${PASSPORT_PERSONAL_ACCESS_CLIENT_SECRET}
      TENANT_SERVICE_URL: ${TENANT_SERVICE_URL:-http://tenant-service}
    volumes:
      - ./services/auth-service:/var/www/html
      - ./docker/logs/auth-service:/var/www/html/storage/logs
    networks:
      - saas_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Tenant Service ───────────────────────────────────────────────────────────

  tenant-service:
    build:
      context: ./services/tenant-service
      dockerfile: Dockerfile
    container_name: saas_tenant_service
    restart: unless-stopped
    environment:
      APP_NAME: "TenantService"
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${TENANT_APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${TENANT_SERVICE_URL:-http://tenant-service}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${TENANT_DB_DATABASE:-tenant_service_db}
      DB_USERNAME: ${MYSQL_USER:-saas}
      DB_PASSWORD: ${MYSQL_PASSWORD:-saassecret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-saas}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-rabbitsecret}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-saas_vhost}
      JWT_SECRET: ${JWT_SECRET}
      MULTI_TENANT_STRATEGY: ${MULTI_TENANT_STRATEGY:-domain}
      CENTRAL_DOMAIN: ${CENTRAL_DOMAIN:-saas.local}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service}
      INVENTORY_SERVICE_URL: ${INVENTORY_SERVICE_URL:-http://inventory-service}
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL:-http://order-service}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    volumes:
      - ./services/tenant-service:/var/www/html
      - ./docker/logs/tenant-service:/var/www/html/storage/logs
    networks:
      - saas_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Inventory Service ────────────────────────────────────────────────────────

  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: saas_inventory_service
    restart: unless-stopped
    environment:
      APP_NAME: "InventoryService"
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${INVENTORY_APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${INVENTORY_SERVICE_URL:-http://inventory-service}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${INVENTORY_DB_DATABASE:-inventory_service_db}
      DB_USERNAME: ${MYSQL_USER:-saas}
      DB_PASSWORD: ${MYSQL_PASSWORD:-saassecret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-saas}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-rabbitsecret}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-saas_vhost}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service}
      TENANT_SERVICE_URL: ${TENANT_SERVICE_URL:-http://tenant-service}
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL:-http://order-service}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:3000}
      LOW_STOCK_THRESHOLD: ${LOW_STOCK_THRESHOLD:-10}
    volumes:
      - ./services/inventory-service:/var/www/html
      - ./docker/logs/inventory-service:/var/www/html/storage/logs
    networks:
      - saas_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Order Service ────────────────────────────────────────────────────────────

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: saas_order_service
    restart: unless-stopped
    environment:
      APP_NAME: "OrderService"
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${ORDER_APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${ORDER_SERVICE_URL:-http://order-service}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${ORDER_DB_DATABASE:-order_service_db}
      DB_USERNAME: ${MYSQL_USER:-saas}
      DB_PASSWORD: ${MYSQL_PASSWORD:-saassecret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-saas}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-rabbitsecret}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-saas_vhost}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service}
      TENANT_SERVICE_URL: ${TENANT_SERVICE_URL:-http://tenant-service}
      INVENTORY_SERVICE_URL: ${INVENTORY_SERVICE_URL:-http://inventory-service}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:3000}
      SAGA_ORCHESTRATOR_URL: ${SAGA_ORCHESTRATOR_URL:-http://saga-orchestrator}
      ORDER_TIMEOUT_MINUTES: ${ORDER_TIMEOUT_MINUTES:-30}
    volumes:
      - ./services/order-service:/var/www/html
      - ./docker/logs/order-service:/var/www/html/storage/logs
    networks:
      - saas_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Notification Service (Node.js) ──────────────────────────────────────────

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: saas_notification_service
    restart: unless-stopped
    environment:
      NODE_ENV: ${APP_ENV:-production}
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-saas}:${RABBITMQ_PASSWORD:-rabbitsecret}@rabbitmq:5672/${RABBITMQ_VHOST:-saas_vhost}
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@saas.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-SaaS Platform}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3000:3000"
    volumes:
      - ./services/notification-service:/app
      - /app/node_modules
      - ./docker/logs/notification-service:/app/logs
    networks:
      - saas_network
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Saga Orchestrator ────────────────────────────────────────────────────────

  saga-orchestrator:
    build:
      context: ./services/saga-orchestrator
      dockerfile: Dockerfile
    container_name: saas_saga_orchestrator
    restart: unless-stopped
    environment:
      APP_NAME: "SagaOrchestrator"
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${SAGA_APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${SAGA_ORCHESTRATOR_URL:-http://saga-orchestrator}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${SAGA_DB_DATABASE:-saga_orchestrator_db}
      DB_USERNAME: ${MYSQL_USER:-saas}
      DB_PASSWORD: ${MYSQL_PASSWORD:-saassecret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-saas}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-rabbitsecret}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-saas_vhost}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service}
      INVENTORY_SERVICE_URL: ${INVENTORY_SERVICE_URL:-http://inventory-service}
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL:-http://order-service}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:3000}
      SAGA_TIMEOUT_SECONDS: ${SAGA_TIMEOUT_SECONDS:-300}
      SAGA_MAX_RETRIES: ${SAGA_MAX_RETRIES:-3}
    volumes:
      - ./services/saga-orchestrator:/var/www/html
      - ./docker/logs/saga-orchestrator:/var/www/html/storage/logs
    networks:
      - saas_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
