services:
  auth-service:
    build: ./services/auth-service
    ports:
      - "8001:80"
    environment:
      - DB_CONNECTION=mysql
      - DB_DATABASE=auth_db
    networks:
      - ims-network

  product-service:
    build: ./services/product-service
    ports:
      - "8002:80"
    environment:
      - DB_CONNECTION=mysql
      - DB_DATABASE=product_db
    networks:
      - ims-network

  inventory-service:
    build: ./services/inventory-service
    ports:
      - "8003:80"
    environment:
      - DB_CONNECTION=mysql
      - DB_DATABASE=inventory_db
    networks:
      - ims-network

  order-service:
    build: ./services/order-service
    ports:
      - "8004:80"
    environment:
      - DB_CONNECTION=mysql
      - DB_DATABASE=order_db
    networks:
      - ims-network

  user-service:
    build: ./services/user-service
    ports:
      - "8005:80"
    environment:
      - DB_CONNECTION=mysql
      - DB_DATABASE=user_db
    networks:
      - ims-network

  frontend:
    build: ./frontend
    ports:
      - "3000:5173"
    networks:
      - ims-network

networks:
  ims-network:
    driver: bridge
