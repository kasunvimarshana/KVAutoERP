version: '3.9'

networks:
  kv-network:
    driver: bridge

volumes:
  mysql-auth-data:
  mysql-user-data:
  mysql-product-data:
  mysql-inventory-data:
  mysql-order-data:
  redis-data:
  rabbitmq-data:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  prometheus-data:
  grafana-data:

services:

  # ─────────────────────────────────────────────
  # NGINX - API Gateway
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: kv-nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - user-service
      - product-service
      - inventory-service
      - order-service
    networks:
      - kv-network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # MICROSERVICES
  # ─────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: kv-auth-service
    ports:
      - "8001:8001"
    environment:
      APP_ENV: production
      APP_PORT: 8001
      DB_HOST: mysql-auth
      DB_PORT: 3306
      DB_DATABASE: auth_db
      DB_USERNAME: auth_user
      DB_PASSWORD: secret
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - kv-network
    restart: unless-stopped
    volumes:
      - ./services/auth-service:/var/www/html

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: kv-user-service
    ports:
      - "8002:8002"
    environment:
      APP_ENV: production
      APP_PORT: 8002
      DB_HOST: mysql-user
      DB_PORT: 3306
      DB_DATABASE: user_db
      DB_USERNAME: user_user
      DB_PASSWORD: secret
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql-user:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - kv-network
    restart: unless-stopped
    volumes:
      - ./services/user-service:/var/www/html

  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    container_name: kv-product-service
    ports:
      - "8003:8003"
    environment:
      APP_ENV: production
      APP_PORT: 8003
      DB_HOST: mysql-product
      DB_PORT: 3306
      DB_DATABASE: product_db
      DB_USERNAME: product_user
      DB_PASSWORD: secret
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql-product:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - kv-network
    restart: unless-stopped
    volumes:
      - ./services/product-service:/var/www/html

  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: kv-inventory-service
    ports:
      - "8004:8004"
    environment:
      APP_ENV: production
      APP_PORT: 8004
      DB_HOST: mysql-inventory
      DB_PORT: 3306
      DB_DATABASE: inventory_db
      DB_USERNAME: inventory_user
      DB_PASSWORD: secret
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql-inventory:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - kv-network
    restart: unless-stopped
    volumes:
      - ./services/inventory-service:/var/www/html

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: kv-order-service
    ports:
      - "8005:8005"
    environment:
      APP_ENV: production
      APP_PORT: 8005
      DB_HOST: mysql-order
      DB_PORT: 3306
      DB_DATABASE: order_db
      DB_USERNAME: order_user
      DB_PASSWORD: secret
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mysql-order:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - kv-network
    restart: unless-stopped
    volumes:
      - ./services/order-service:/var/www/html

  # ─────────────────────────────────────────────
  # DATABASES - One per service (Database-per-Service pattern)
  # ─────────────────────────────────────────────
  mysql-auth:
    image: mysql:8.0
    container_name: kv-mysql-auth
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: auth_db
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: secret
    volumes:
      - mysql-auth-data:/var/lib/mysql
    networks:
      - kv-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "auth_user", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-user:
    image: mysql:8.0
    container_name: kv-mysql-user
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: user_db
      MYSQL_USER: user_user
      MYSQL_PASSWORD: secret
    volumes:
      - mysql-user-data:/var/lib/mysql
    networks:
      - kv-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "user_user", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-product:
    image: mysql:8.0
    container_name: kv-mysql-product
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: product_db
      MYSQL_USER: product_user
      MYSQL_PASSWORD: secret
    volumes:
      - mysql-product-data:/var/lib/mysql
    networks:
      - kv-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "product_user", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-inventory:
    image: mysql:8.0
    container_name: kv-mysql-inventory
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: inventory_db
      MYSQL_USER: inventory_user
      MYSQL_PASSWORD: secret
    volumes:
      - mysql-inventory-data:/var/lib/mysql
    networks:
      - kv-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "inventory_user", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-order:
    image: mysql:8.0
    container_name: kv-mysql-order
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: order_db
      MYSQL_USER: order_user
      MYSQL_PASSWORD: secret
    volumes:
      - mysql-order-data:/var/lib/mysql
    networks:
      - kv-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "order_user", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # REDIS - Caching & Sessions
  # ─────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: kv-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - kv-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # RABBITMQ - Message Broker
  # ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: kv-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - kv-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  # ZOOKEEPER + KAFKA - Event Streaming
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: kv-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - kv-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kv-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    networks:
      - kv-network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # PROMETHEUS + GRAFANA - Monitoring
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: kv-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - kv-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.1.0
    container_name: kv-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - kv-network
    restart: unless-stopped
