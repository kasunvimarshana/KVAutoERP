version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# KV Enterprise SaaS – Auth Service Docker Compose
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ────────────────────────────────────────────────────────────────────
  # Auth Service (Laravel)
  # ────────────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: ../../docker/auth-service/Dockerfile
      target: production
    container_name: kv-auth-service
    restart: unless-stopped
    ports:
      - "8001:80"
    environment:
      APP_NAME: "KV Auth Service"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: "${AUTH_APP_KEY}"
      APP_URL: "http://localhost:8001"
      DB_CONNECTION: mysql
      DB_HOST: auth-mysql
      DB_PORT: 3306
      DB_DATABASE: kv_auth
      DB_USERNAME: kv_auth
      DB_PASSWORD: "${AUTH_DB_PASSWORD:-secret}"
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ALGO: RS256
      JWT_TTL: 15
      JWT_REFRESH_TTL: 43200
      JWT_PUBLIC_KEY_PATH: storage/keys/public.pem
      JWT_PRIVATE_KEY_PATH: storage/keys/private.pem
    volumes:
      - auth-keys:/app/storage/keys
      - auth-logs:/app/storage/logs
    depends_on:
      auth-mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kv-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ────────────────────────────────────────────────────────────────────
  # Auth Service Database (MySQL)
  # ────────────────────────────────────────────────────────────────────
  auth-mysql:
    image: mysql:8.0
    container_name: kv-auth-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${AUTH_DB_ROOT_PASSWORD:-rootsecret}"
      MYSQL_DATABASE: kv_auth
      MYSQL_USER: kv_auth
      MYSQL_PASSWORD: "${AUTH_DB_PASSWORD:-secret}"
    volumes:
      - auth-mysql-data:/var/lib/mysql
    networks:
      - kv-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${AUTH_DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ────────────────────────────────────────────────────────────────────
  # Shared Redis (used by all microservices for revocation list and cache)
  # ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kv-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-}"
    volumes:
      - redis-data:/data
    networks:
      - kv-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ────────────────────────────────────────────────────────────────────
  # RabbitMQ (Message Broker for Outbox Pattern)
  # ────────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: kv-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:-admin}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASS:-secret}"
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - kv-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

# ─────────────────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  auth-mysql-data:
  auth-keys:
  auth-logs:
  redis-data:
  rabbitmq-data:

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  kv-network:
    driver: bridge
