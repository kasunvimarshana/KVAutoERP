version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# KV-SAAS-APP — Docker Compose orchestration
#
# Services:
#   auth-service  — JWT issuance, login/logout, SSO, token rotation   (:8000)
#   user-service  — Users, tenants, roles, permissions, ABAC, files   (:8001)
#   mysql         — Shared relational database (isolated per service)
#   redis         — Token revocation, session state, rate-limit counters
#
# Usage:
#   docker compose up --build          # start everything
#   docker compose up auth-service     # start a single service
#   docker compose down -v             # stop and remove volumes
# ─────────────────────────────────────────────────────────────────────────────

networks:
  kv-saas-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:

services:

  # ────────────────────────────────────────────────────────────
  # MySQL 8
  # ────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    networks:
      - kv-saas-network
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-kv_saas}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────
  # Redis 7
  # ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - kv-saas-network
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────
  # Auth Service  (port 8000)
  # ────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    networks:
      - kv-saas-network
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV:  ${APP_ENV:-production}
      APP_KEY:  ${AUTH_APP_KEY:-base64:changeme}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL:  ${AUTH_APP_URL:-http://localhost:8000}

      DB_CONNECTION: mysql
      DB_HOST:       mysql
      DB_PORT:       3306
      DB_DATABASE:   ${AUTH_DB_DATABASE:-auth_service}
      DB_USERNAME:   ${MYSQL_USER:-root}
      DB_PASSWORD:   ${MYSQL_ROOT_PASSWORD:-rootpassword}

      REDIS_HOST:     redis
      REDIS_PORT:     6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # Asymmetric JWT signing keys — mount via secrets in production
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/var/www/html/storage/keys/private.pem}
      JWT_PUBLIC_KEY_PATH:  ${JWT_PUBLIC_KEY_PATH:-/var/www/html/storage/keys/public.pem}
      JWT_TTL:              ${JWT_TTL:-900}
      JWT_REFRESH_TTL:      ${JWT_REFRESH_TTL:-604800}

      # User service internal API
      USER_SERVICE_URL:          ${USER_SERVICE_URL:-http://user-service:8001}
      USER_SERVICE_TOKEN:        ${USER_SERVICE_TOKEN:-changeme-service-token}

      # Suspicious activity detection
      AUTH_MAX_ATTEMPTS: ${AUTH_MAX_ATTEMPTS:-5}
      AUTH_LOCKOUT_TTL:  ${AUTH_LOCKOUT_TTL:-900}
    volumes:
      - ./services/auth-service/storage/keys:/var/www/html/storage/keys:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ────────────────────────────────────────────────────────────
  # User Service  (port 8001)
  # ────────────────────────────────────────────────────────────
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    networks:
      - kv-saas-network
    ports:
      - "8001:8001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV:   ${APP_ENV:-production}
      APP_KEY:   ${USER_APP_KEY:-base64:changeme}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL:   ${USER_APP_URL:-http://localhost:8001}

      DB_CONNECTION: mysql
      DB_HOST:       mysql
      DB_PORT:       3306
      DB_DATABASE:   ${USER_DB_DATABASE:-user_service}
      DB_USERNAME:   ${MYSQL_USER:-root}
      DB_PASSWORD:   ${MYSQL_ROOT_PASSWORD:-rootpassword}

      REDIS_HOST:     redis
      REDIS_PORT:     6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # Public key for verifying JWTs issued by auth-service
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/var/www/html/storage/keys/public.pem}

      # Service-to-service token expected by VerifyServiceToken middleware
      AUTH_SERVICE_TOKEN: ${USER_SERVICE_TOKEN:-changeme-service-token}

      # File storage (S3 / local)
      FILESYSTEM_DISK:       ${FILESYSTEM_DISK:-local}
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION:    ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_BUCKET:            ${AWS_BUCKET:-}
    volumes:
      - ./services/auth-service/storage/keys:/var/www/html/storage/keys:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
