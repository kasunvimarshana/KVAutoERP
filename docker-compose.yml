version: '3.9'

# ============================================================
# Enterprise Inventory Management System - Docker Compose
# Multi-tenant SaaS with Microservices Architecture
# ============================================================

networks:
  ims_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  auth_db_data:
  inventory_db_data:
  order_db_data:
  payment_db_data:
  redis_data:
  kafka_data:
  rabbitmq_data:
  zookeeper_data:

services:

  # ============================================================
  # API Gateway / Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: ims_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - auth-service
      - inventory-service
      - order-service
      - payment-service
    networks:
      - ims_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # Auth Service (Laravel) - Multi-tenant SSO, RBAC/ABAC
  # ============================================================
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
      target: production
    container_name: ims_auth_service
    environment:
      APP_NAME: "IMS Auth Service"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${AUTH_APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "http://auth-service:8001"
      LOG_CHANNEL: stack
      LOG_LEVEL: "${LOG_LEVEL:-error}"
      # Database
      DB_CONNECTION: mysql
      DB_HOST: auth-db
      DB_PORT: 3306
      DB_DATABASE: "${AUTH_DB_DATABASE:-ims_auth}"
      DB_USERNAME: "${AUTH_DB_USERNAME:-auth_user}"
      DB_PASSWORD: "${AUTH_DB_PASSWORD}"
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      # Passport
      PASSPORT_PRIVATE_KEY: "${PASSPORT_PRIVATE_KEY}"
      PASSPORT_PUBLIC_KEY: "${PASSPORT_PUBLIC_KEY}"
      # Message Broker
      MESSAGE_BROKER_DRIVER: "${MESSAGE_BROKER_DRIVER:-rabbitmq}"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: "${RABBITMQ_USER:-guest}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:-guest}"
      KAFKA_BROKERS: "kafka:9092"
      # Service URLs
      INVENTORY_SERVICE_URL: "http://inventory-service:8002"
      ORDER_SERVICE_URL: "http://order-service:8003"
      PAYMENT_SERVICE_URL: "http://payment-service:8004"
    ports:
      - "8001:8001"
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ims_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================================
  # Inventory Service (Laravel) - DDD, Inventory Management
  # ============================================================
  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
      target: production
    container_name: ims_inventory_service
    environment:
      APP_NAME: "IMS Inventory Service"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${INVENTORY_APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "http://inventory-service:8002"
      LOG_CHANNEL: stack
      LOG_LEVEL: "${LOG_LEVEL:-error}"
      # Database
      DB_CONNECTION: mysql
      DB_HOST: inventory-db
      DB_PORT: 3306
      DB_DATABASE: "${INVENTORY_DB_DATABASE:-ims_inventory}"
      DB_USERNAME: "${INVENTORY_DB_USERNAME:-inventory_user}"
      DB_PASSWORD: "${INVENTORY_DB_PASSWORD}"
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      # Message Broker
      MESSAGE_BROKER_DRIVER: "${MESSAGE_BROKER_DRIVER:-rabbitmq}"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: "${RABBITMQ_USER:-guest}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:-guest}"
      KAFKA_BROKERS: "kafka:9092"
      # Auth Service
      AUTH_SERVICE_URL: "http://auth-service:8001"
      PASSPORT_PUBLIC_KEY: "${PASSPORT_PUBLIC_KEY}"
      # Webhooks
      WEBHOOK_SECRET: "${WEBHOOK_SECRET}"
    ports:
      - "8002:8002"
    depends_on:
      inventory-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - ims_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================================
  # Order Service (Laravel) - Saga Orchestration
  # ============================================================
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
      target: production
    container_name: ims_order_service
    environment:
      APP_NAME: "IMS Order Service"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${ORDER_APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "http://order-service:8003"
      LOG_CHANNEL: stack
      LOG_LEVEL: "${LOG_LEVEL:-error}"
      # Database
      DB_CONNECTION: mysql
      DB_HOST: order-db
      DB_PORT: 3306
      DB_DATABASE: "${ORDER_DB_DATABASE:-ims_orders}"
      DB_USERNAME: "${ORDER_DB_USERNAME:-order_user}"
      DB_PASSWORD: "${ORDER_DB_PASSWORD}"
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      # Message Broker
      MESSAGE_BROKER_DRIVER: "${MESSAGE_BROKER_DRIVER:-rabbitmq}"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: "${RABBITMQ_USER:-guest}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:-guest}"
      KAFKA_BROKERS: "kafka:9092"
      # Service URLs
      AUTH_SERVICE_URL: "http://auth-service:8001"
      INVENTORY_SERVICE_URL: "http://inventory-service:8002"
      PAYMENT_SERVICE_URL: "http://payment-service:8004"
      PASSPORT_PUBLIC_KEY: "${PASSPORT_PUBLIC_KEY}"
    ports:
      - "8003:8003"
    depends_on:
      order-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ims_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================================
  # Payment Service (Node.js/Express) - Different Tech Stack
  # ============================================================
  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: ims_payment_service
    environment:
      NODE_ENV: "${APP_ENV:-production}"
      PORT: 8004
      # Database (PostgreSQL - different from other services)
      DATABASE_URL: "postgresql://${PAYMENT_DB_USERNAME:-payment_user}:${PAYMENT_DB_PASSWORD}@payment-db:5432/${PAYMENT_DB_DATABASE:-ims_payments}"
      # Redis
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      # Message Broker
      MESSAGE_BROKER_DRIVER: "${MESSAGE_BROKER_DRIVER:-rabbitmq}"
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672"
      KAFKA_BROKERS: "kafka:9092"
      # Auth
      AUTH_SERVICE_URL: "http://auth-service:8001"
      JWT_PUBLIC_KEY: "${PASSPORT_PUBLIC_KEY}"
      # Service URLs
      ORDER_SERVICE_URL: "http://order-service:8003"
    ports:
      - "8004:8004"
    depends_on:
      payment-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ims_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8004/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ============================================================
  # Databases
  # ============================================================
  auth-db:
    image: mysql:8.0
    container_name: ims_auth_db
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${AUTH_DB_DATABASE:-ims_auth}"
      MYSQL_USER: "${AUTH_DB_USERNAME:-auth_user}"
      MYSQL_PASSWORD: "${AUTH_DB_PASSWORD}"
    volumes:
      - auth_db_data:/var/lib/mysql
      - ./docker/mysql/auth-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ims_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  inventory-db:
    image: mysql:8.0
    container_name: ims_inventory_db
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${INVENTORY_DB_DATABASE:-ims_inventory}"
      MYSQL_USER: "${INVENTORY_DB_USERNAME:-inventory_user}"
      MYSQL_PASSWORD: "${INVENTORY_DB_PASSWORD}"
    volumes:
      - inventory_db_data:/var/lib/mysql
      - ./docker/mysql/inventory-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ims_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  order-db:
    image: mysql:8.0
    container_name: ims_order_db
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${ORDER_DB_DATABASE:-ims_orders}"
      MYSQL_USER: "${ORDER_DB_USERNAME:-order_user}"
      MYSQL_PASSWORD: "${ORDER_DB_PASSWORD}"
    volumes:
      - order_db_data:/var/lib/mysql
    networks:
      - ims_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  payment-db:
    image: postgres:15-alpine
    container_name: ims_payment_db
    environment:
      POSTGRES_DB: "${PAYMENT_DB_DATABASE:-ims_payments}"
      POSTGRES_USER: "${PAYMENT_DB_USERNAME:-payment_user}"
      POSTGRES_PASSWORD: "${PAYMENT_DB_PASSWORD}"
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    networks:
      - ims_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_USERNAME:-payment_user} -d ${PAYMENT_DB_DATABASE:-ims_payments}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # Redis - Cache, Session, Queue
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: ims_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - ims_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================
  # RabbitMQ - Message Broker (pluggable - can swap with Kafka)
  # ============================================================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ims_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:-guest}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:-guest}"
      RABBITMQ_DEFAULT_VHOST: "ims"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - ims_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ============================================================
  # Kafka + Zookeeper (optional broker - swap via MESSAGE_BROKER_DRIVER)
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ims_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - ims_network
    restart: unless-stopped
    profiles: ["kafka"]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ims_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "29092:29092"
    networks:
      - ims_network
    restart: unless-stopped
    profiles: ["kafka"]

  # ============================================================
  # Queue Workers (Laravel Horizon alternative)
  # ============================================================
  auth-queue-worker:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
      target: production
    container_name: ims_auth_queue
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    environment:
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${AUTH_APP_KEY}"
      DB_HOST: auth-db
      DB_DATABASE: "${AUTH_DB_DATABASE:-ims_auth}"
      DB_USERNAME: "${AUTH_DB_USERNAME:-auth_user}"
      DB_PASSWORD: "${AUTH_DB_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      QUEUE_CONNECTION: redis
      MESSAGE_BROKER_DRIVER: "${MESSAGE_BROKER_DRIVER:-rabbitmq}"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: "${RABBITMQ_USER:-guest}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:-guest}"
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ims_network
    restart: unless-stopped

  order-queue-worker:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
      target: production
    container_name: ims_order_queue
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    environment:
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${ORDER_APP_KEY}"
      DB_HOST: order-db
      DB_DATABASE: "${ORDER_DB_DATABASE:-ims_orders}"
      DB_USERNAME: "${ORDER_DB_USERNAME:-order_user}"
      DB_PASSWORD: "${ORDER_DB_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      QUEUE_CONNECTION: redis
      MESSAGE_BROKER_DRIVER: "${MESSAGE_BROKER_DRIVER:-rabbitmq}"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: "${RABBITMQ_USER:-guest}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:-guest}"
      INVENTORY_SERVICE_URL: "http://inventory-service:8002"
      PAYMENT_SERVICE_URL: "http://payment-service:8004"
    depends_on:
      order-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ims_network
    restart: unless-stopped
