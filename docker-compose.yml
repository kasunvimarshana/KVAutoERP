version: "3.9"

networks:
  microservices_net:
    driver: bridge

volumes:
  user_mysql_data:
  order_mysql_data:
  product_mongo_data:
  payment_postgres_data:
  rabbitmq_data:

services:
  # ─────────────────────────────────────────────
  # Message Broker
  # ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - microservices_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # User Service Database
  # ─────────────────────────────────────────────
  user_db:
    image: mysql:8.0
    container_name: user_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: users_db
      MYSQL_USER: user_svc
      MYSQL_PASSWORD: user_pass
    volumes:
      - user_mysql_data:/var/lib/mysql
    networks:
      - microservices_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # User Service (Laravel/Lumen + MySQL)
  # ─────────────────────────────────────────────
  user_service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user_service
    ports:
      - "8001:8000"
    environment:
      APP_ENV: local
      APP_KEY: base64:SomeRandomAppKeyForUserService123==
      DB_CONNECTION: mysql
      DB_HOST: user_db
      DB_PORT: 3306
      DB_DATABASE: users_db
      DB_USERNAME: user_svc
      DB_PASSWORD: user_pass
      JWT_SECRET: user_service_jwt_secret_key_2024
    depends_on:
      user_db:
        condition: service_healthy
    networks:
      - microservices_net

  # ─────────────────────────────────────────────
  # Product Service Database
  # ─────────────────────────────────────────────
  product_db:
    image: mongo:7.0
    container_name: product_db
    environment:
      MONGO_INITDB_ROOT_USERNAME: prod_user
      MONGO_INITDB_ROOT_PASSWORD: prod_pass
      MONGO_INITDB_DATABASE: products_db
    volumes:
      - product_mongo_data:/data/db
    networks:
      - microservices_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # Product Service (Node.js Express + MongoDB)
  # ─────────────────────────────────────────────
  product_service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product_service
    ports:
      - "8002:8000"
    environment:
      PORT: 8000
      MONGO_URI: mongodb://prod_user:prod_pass@product_db:27017/products_db?authSource=admin
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      SERVICE_NAME: product-service
    depends_on:
      product_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices_net

  # ─────────────────────────────────────────────
  # Order Service Database
  # ─────────────────────────────────────────────
  order_db:
    image: mysql:8.0
    container_name: order_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orders_db
      MYSQL_USER: order_svc
      MYSQL_PASSWORD: order_pass
    volumes:
      - order_mysql_data:/var/lib/mysql
    networks:
      - microservices_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # Order Service (Laravel/Lumen + MySQL, Saga Orchestrator)
  # ─────────────────────────────────────────────
  order_service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order_service
    ports:
      - "8003:8000"
    environment:
      APP_ENV: local
      APP_KEY: base64:SomeRandomAppKeyForOrderService123==
      DB_CONNECTION: mysql
      DB_HOST: order_db
      DB_PORT: 3306
      DB_DATABASE: orders_db
      DB_USERNAME: order_svc
      DB_PASSWORD: order_pass
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      JWT_SECRET: user_service_jwt_secret_key_2024
      PRODUCT_SERVICE_URL: http://product_service:8000
      USER_SERVICE_URL: http://user_service:8000
    depends_on:
      order_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices_net

  # ─────────────────────────────────────────────
  # Payment Service Database
  # ─────────────────────────────────────────────
  payment_db:
    image: postgres:16
    container_name: payment_db
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: pay_user
      POSTGRES_PASSWORD: pay_pass
    volumes:
      - payment_postgres_data:/var/lib/postgresql/data
    networks:
      - microservices_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pay_user -d payments_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # Payment Service (Python FastAPI + PostgreSQL)
  # ─────────────────────────────────────────────
  payment_service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment_service
    ports:
      - "8004:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://pay_user:pay_pass@payment_db:5432/payments_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      SERVICE_NAME: payment-service
    depends_on:
      payment_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices_net

  # ─────────────────────────────────────────────
  # API Gateway (Node.js Express)
  # ─────────────────────────────────────────────
  api_gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api_gateway
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      USER_SERVICE_URL: http://user_service:8000
      PRODUCT_SERVICE_URL: http://product_service:8000
      ORDER_SERVICE_URL: http://order_service:8000
      PAYMENT_SERVICE_URL: http://payment_service:8000
      JWT_SECRET: user_service_jwt_secret_key_2024
    depends_on:
      - user_service
      - product_service
      - order_service
      - payment_service
    networks:
      - microservices_net
