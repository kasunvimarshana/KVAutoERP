version: '3.9'

networks:
  saas-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local
  kafka-data:
    driver: local
  zookeeper-data:
    driver: local
  zookeeper-log:
    driver: local

services:
  # ─────────────────────────────────────────────
  # API Gateway (Node.js / Express)
  # ─────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: kv_api_gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NODE_ENV=${APP_ENV:-production}
      - PORT=8000
      - AUTH_SERVICE_URL=http://auth-service-nginx:80
      - TENANT_SERVICE_URL=http://tenant-service-nginx:80
      - INVENTORY_SERVICE_URL=http://inventory-service-nginx:80
      - ORDER_SERVICE_URL=http://order-service-nginx:80
      - PAYMENT_SERVICE_URL=http://payment-service-nginx:80
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      auth-service-nginx:
        condition: service_started
    networks:
      - saas-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────────────
  # Auth Service (PHP-FPM + Nginx)
  # ─────────────────────────────────────────────
  auth-service-fpm:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
      target: fpm
    container_name: kv_auth_fpm
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DB_CONNECTION=mysql
      - DB_HOST=${MYSQL_HOST:-mysql}
      - DB_PORT=${MYSQL_PORT:-3306}
      - DB_DATABASE=${MYSQL_DATABASE:-kv_auth}
      - DB_USERNAME=${MYSQL_USERNAME:-kv_user}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - KAFKA_BROKER=${KAFKA_BROKER:-kafka:9092}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saas-network
    volumes:
      - ./auth-service:/var/www/html:ro
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  auth-service-nginx:
    image: nginx:1.25-alpine
    container_name: kv_auth_nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./auth-service:/var/www/html:ro
      - ./auth-service/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service-fpm
    networks:
      - saas-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # Tenant Service (PHP-FPM + Nginx)
  # ─────────────────────────────────────────────
  tenant-service-fpm:
    build:
      context: ./tenant-service
      dockerfile: Dockerfile
      target: fpm
    container_name: kv_tenant_fpm
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DB_HOST=${MYSQL_HOST:-mysql}
      - DB_PORT=${MYSQL_PORT:-3306}
      - DB_DATABASE=${MYSQL_DATABASE:-kv_tenants}
      - DB_USERNAME=${MYSQL_USERNAME:-kv_user}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-redis}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saas-network
    volumes:
      - ./tenant-service:/var/www/html:ro
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  tenant-service-nginx:
    image: nginx:1.25-alpine
    container_name: kv_tenant_nginx
    restart: unless-stopped
    ports:
      - "8002:80"
    volumes:
      - ./tenant-service:/var/www/html:ro
      - ./tenant-service/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - tenant-service-fpm
    networks:
      - saas-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # Inventory Service (PHP-FPM + Nginx)
  # ─────────────────────────────────────────────
  inventory-service-fpm:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
      target: fpm
    container_name: kv_inventory_fpm
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DB_HOST=${MYSQL_HOST:-mysql}
      - DB_PORT=${MYSQL_PORT:-3306}
      - DB_DATABASE=${MYSQL_DATABASE:-kv_inventory}
      - DB_USERNAME=${MYSQL_USERNAME:-kv_user}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - KAFKA_BROKER=${KAFKA_BROKER:-kafka:9092}
      - MESSAGE_BROKER_DRIVER=${MESSAGE_BROKER_DRIVER:-rabbitmq}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - saas-network
    volumes:
      - ./inventory-service:/var/www/html:ro
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  inventory-service-nginx:
    image: nginx:1.25-alpine
    container_name: kv_inventory_nginx
    restart: unless-stopped
    ports:
      - "8003:80"
    volumes:
      - ./inventory-service:/var/www/html:ro
      - ./inventory-service/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - inventory-service-fpm
    networks:
      - saas-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # Order Service (PHP-FPM + Nginx)
  # ─────────────────────────────────────────────
  order-service-fpm:
    build:
      context: ./order-service
      dockerfile: Dockerfile
      target: fpm
    container_name: kv_order_fpm
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DB_HOST=${MYSQL_HOST:-mysql}
      - DB_PORT=${MYSQL_PORT:-3306}
      - DB_DATABASE=${MYSQL_DATABASE:-kv_orders}
      - DB_USERNAME=${MYSQL_USERNAME:-kv_user}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - KAFKA_BROKER=${KAFKA_BROKER:-kafka:9092}
      - MESSAGE_BROKER_DRIVER=${MESSAGE_BROKER_DRIVER:-rabbitmq}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - saas-network
    volumes:
      - ./order-service:/var/www/html:ro
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  order-service-nginx:
    image: nginx:1.25-alpine
    container_name: kv_order_nginx
    restart: unless-stopped
    ports:
      - "8004:80"
    volumes:
      - ./order-service:/var/www/html:ro
      - ./order-service/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - order-service-fpm
    networks:
      - saas-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # Payment Service (PHP-FPM + Nginx)
  # ─────────────────────────────────────────────
  payment-service-fpm:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
      target: fpm
    container_name: kv_payment_fpm
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DB_HOST=${MYSQL_HOST:-mysql}
      - DB_PORT=${MYSQL_PORT:-3306}
      - DB_DATABASE=${MYSQL_DATABASE:-kv_payments}
      - DB_USERNAME=${MYSQL_USERNAME:-kv_user}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - KAFKA_BROKER=${KAFKA_BROKER:-kafka:9092}
      - MESSAGE_BROKER_DRIVER=${MESSAGE_BROKER_DRIVER:-rabbitmq}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - saas-network
    volumes:
      - ./payment-service:/var/www/html:ro
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  payment-service-nginx:
    image: nginx:1.25-alpine
    container_name: kv_payment_nginx
    restart: unless-stopped
    ports:
      - "8005:80"
    volumes:
      - ./payment-service:/var/www/html:ro
      - ./payment-service/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - payment-service-fpm
    networks:
      - saas-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # MySQL 8
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: kv_mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kv_saas}
      MYSQL_USER: ${MYSQL_USERNAME:-kv_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    networks:
      - saas-network
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --max-connections=500
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kv_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redissecret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - saas-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────
  # RabbitMQ 3
  # ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: kv_rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-kv_rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitsecret}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/kv_saas}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit log [{console,[{level,warning}]}]"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - saas-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # Zookeeper (for Kafka)
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: kv_zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - saas-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────
  # Kafka (Confluent)
  # ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kv_kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - saas-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
