services:
  # ============================================================
  # Infrastructure Services
  # ============================================================

  mysql:
    image: mysql:8.0
    container_name: iam-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: product_service
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - iam-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: iam-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - iam-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: iam-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - iam-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: iam-keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql:3306/keycloak_db
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: secret
      KC_HOSTNAME: localhost
    command: start-dev
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - iam-network

  # ============================================================
  # Microservices
  # ============================================================

  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    container_name: iam-product-service
    restart: unless-stopped
    environment:
      APP_NAME: "Product Service"
      APP_ENV: production
      APP_KEY: base64:replace_with_generated_key=
      APP_DEBUG: "false"
      APP_URL: http://product-service:8001
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: product_service
      DB_USERNAME: root
      DB_PASSWORD: secret
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: inventory-realm
      KEYCLOAK_CLIENT_ID: product-service
      KEYCLOAK_CLIENT_SECRET: ${PRODUCT_SERVICE_CLIENT_SECRET}
      INVENTORY_SERVICE_URL: http://inventory-service:8002
    ports:
      - "8001:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - iam-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: iam-inventory-service
    restart: unless-stopped
    environment:
      APP_NAME: "Inventory Service"
      APP_ENV: production
      APP_KEY: base64:replace_with_generated_key=
      APP_DEBUG: "false"
      APP_URL: http://inventory-service:8002
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: inventory_service
      DB_USERNAME: root
      DB_PASSWORD: secret
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: inventory-realm
      KEYCLOAK_CLIENT_ID: inventory-service
      KEYCLOAK_CLIENT_SECRET: ${INVENTORY_SERVICE_CLIENT_SECRET}
      PRODUCT_SERVICE_URL: http://product-service:8001
    ports:
      - "8002:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - iam-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: iam-order-service
    restart: unless-stopped
    environment:
      APP_NAME: "Order Service"
      APP_ENV: production
      APP_KEY: base64:replace_with_generated_key=
      APP_DEBUG: "false"
      APP_URL: http://order-service:8003
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: order_service
      DB_USERNAME: root
      DB_PASSWORD: secret
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: inventory-realm
      KEYCLOAK_CLIENT_ID: order-service
      KEYCLOAK_CLIENT_SECRET: ${ORDER_SERVICE_CLIENT_SECRET}
      INVENTORY_SERVICE_URL: http://inventory-service:8002
    ports:
      - "8003:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iam-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: iam-user-service
    restart: unless-stopped
    environment:
      APP_NAME: "User Service"
      APP_ENV: production
      APP_KEY: base64:replace_with_generated_key=
      APP_DEBUG: "false"
      APP_URL: http://user-service:8004
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: user_service
      DB_USERNAME: root
      DB_PASSWORD: secret
      REDIS_HOST: redis
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: inventory-realm
      KEYCLOAK_CLIENT_ID: user-service
      KEYCLOAK_CLIENT_SECRET: ${USER_SERVICE_CLIENT_SECRET}
    ports:
      - "8004:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iam-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # Frontend
  # ============================================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iam-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - product-service
      - inventory-service
      - order-service
      - user-service
    networks:
      - iam-network

  # ============================================================
  # API Gateway (Nginx)
  # ============================================================

  nginx:
    image: nginx:alpine
    container_name: iam-nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - product-service
      - inventory-service
      - order-service
      - user-service
      - frontend
    networks:
      - iam-network

volumes:
  mysql_data:
  rabbitmq_data:

networks:
  iam-network:
    driver: bridge
