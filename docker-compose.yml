services:

  # ── Backend (Laravel) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas_backend
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: "${APP_KEY:-base64:changeme_run_php_artisan_key_generate}"
      APP_URL: "http://localhost:8000"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: saas_inventory
      DB_USERNAME: saas_user
      DB_PASSWORD: saas_pass
      MESSAGE_BROKER_DRIVER: "${MESSAGE_BROKER_DRIVER:-null}"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      KAFKA_BROKERS: "kafka:9092"
      FRONTEND_URL: "http://localhost:5173"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage
    networks:
      - saas_net
    command: >
      sh -c "composer install --no-interaction &&
             php artisan migrate --seed --force &&
             php artisan passport:client --personal --no-interaction --quiet || true &&
             php artisan serve --host=0.0.0.0 --port=8000"

  # ── Frontend (React / Vite) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saas_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: "http://localhost:8000/api"
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - saas_net

  # ── MySQL ──────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.3
    container_name: saas_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: saas_inventory
      MYSQL_USER: saas_user
      MYSQL_PASSWORD: saas_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "saas_user", "-psaas_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas_net

  # ── RabbitMQ (optional – set MESSAGE_BROKER_DRIVER=rabbitmq to use) ────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: saas_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - saas_net
    profiles:
      - rabbitmq

  # ── Apache Kafka (optional – set MESSAGE_BROKER_DRIVER=kafka to use) ───────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: saas_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - saas_net
    profiles:
      - kafka

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: saas_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - saas_net
    profiles:
      - kafka

volumes:
  mysql_data:
  backend_storage:

networks:
  saas_net:
    driver: bridge
