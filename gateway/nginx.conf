worker_processes auto;
events { worker_connections 1024; }

http {
    upstream auth_service     { server auth_service:80; }
    upstream user_service     { server user_service:80; }
    upstream product_service  { server product_service:80; }
    upstream inventory_service { server inventory_service:80; }
    upstream order_service    { server order_service:80; }

    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

    server {
        listen 80;
        server_name _;

        location /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"ok","service":"gateway"}';
        }

        location /api/v1/auth/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://auth_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/users/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://user_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/products/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://product_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/inventory/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://inventory_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/orders/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://order_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
