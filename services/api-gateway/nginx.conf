# ─── Rate-limiting zones ──────────────────────────────────────────────────────
# Keyed on binary IP address; 10 MB zone can track ~80 000 unique IPs.
# "100r/m" = 100 requests per minute per IP (≈ 1.67 r/s burst handled below).
limit_req_zone $binary_remote_addr zone=api_rate_limit:10m rate=100r/m;

# ─── Upstream backends ────────────────────────────────────────────────────────
upstream auth_service {
    least_conn;
    server auth-service:9000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream tenant_service {
    least_conn;
    server tenant-service:9000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream inventory_service {
    least_conn;
    server inventory-service:9000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream order_service {
    least_conn;
    server order-service:9000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream notification_service {
    least_conn;
    server notification-service:3000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# ─── Main server block ────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # ── Request / response settings ──────────────────────────────────────────
    client_max_body_size        50m;
    client_body_buffer_size     128k;
    client_header_buffer_size   4k;
    large_client_header_buffers 4 32k;

    # ── Timeouts ─────────────────────────────────────────────────────────────
    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;
    proxy_read_timeout     60s;
    send_timeout           60s;
    keepalive_timeout      65s;

    # ── Logging ──────────────────────────────────────────────────────────────
    # Uses the 'main' log format defined in nginx.conf (or the default combined)
    access_log /var/log/nginx/access.log combined buffer=64k flush=5s;
    error_log  /var/log/nginx/error.log  warn;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"         always;
    add_header X-Frame-Options          "SAMEORIGIN"      always;
    add_header X-XSS-Protection         "1; mode=block"   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=()" always;
    server_tokens off;

    # ── CORS helper macro ─────────────────────────────────────────────────────
    # Applied inside every API location block via the map/variables below.
    set $cors_origin "";
    # Also allow exact tenant subdomain pattern: <identifier>.saas.example.com
    # The pattern restricts to single-level subdomains (no dots before .saas.)
    # to prevent cross-tenant or third-party domain abuse.
    if ($http_origin ~* "^https?://(localhost(:[0-9]+)?|[a-z0-9-]+\.saas\.example\.com)$") {
        set $cors_origin $http_origin;
    }

    # ── Health check (no rate-limit, no auth) ────────────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type "application/json" always;
        return 200 '{"status":"ok","service":"api-gateway"}';
    }

    # ── CORS pre-flight shortcut ──────────────────────────────────────────────
    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, X-Tenant-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age           "86400" always;
            add_header Content-Length 0;
            return 204;
        }

        # Reject unknown top-level paths
        return 404;
    }

    # ── Auth Service  /api/auth/* ─────────────────────────────────────────────
    location /api/auth/ {
        # Apply rate limiting; allow a burst of 20 requests queued without delay
        limit_req zone=api_rate_limit burst=20 nodelay;
        limit_req_status 429;

        # CORS
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, X-Tenant-ID" always;
        add_header Access-Control-Allow-Credentials "true" always;

        proxy_pass         http://auth_service/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Buffer upstream responses to avoid slow-loris
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }

    # ── Tenant Service  /api/tenants/* ───────────────────────────────────────
    location /api/tenants/ {
        limit_req zone=api_rate_limit burst=20 nodelay;
        limit_req_status 429;

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, X-Tenant-ID" always;
        add_header Access-Control-Allow-Credentials "true" always;

        proxy_pass         http://tenant_service/api/tenants/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }

    # ── Inventory Service  /api/inventory/* ──────────────────────────────────
    location /api/inventory/ {
        limit_req zone=api_rate_limit burst=20 nodelay;
        limit_req_status 429;

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, X-Tenant-ID" always;
        add_header Access-Control-Allow-Credentials "true" always;

        proxy_pass         http://inventory_service/api/inventory/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }

    # ── Order Service  /api/orders/* ─────────────────────────────────────────
    location /api/orders/ {
        limit_req zone=api_rate_limit burst=20 nodelay;
        limit_req_status 429;

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, X-Tenant-ID" always;
        add_header Access-Control-Allow-Credentials "true" always;

        proxy_pass         http://order_service/api/orders/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }

    # ── Notification Service  /api/notifications/* ───────────────────────────
    location /api/notifications/ {
        limit_req zone=api_rate_limit burst=20 nodelay;
        limit_req_status 429;

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, X-Tenant-ID" always;
        add_header Access-Control-Allow-Credentials "true" always;

        proxy_pass         http://notification_service/api/notifications/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }

    # WebSocket endpoint for real-time notifications ────────────────────────────
    location /ws/ {
        proxy_pass         http://notification_service/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_buffering    off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Custom error pages ────────────────────────────────────────────────────
    error_page 429 @too_many_requests;
    location @too_many_requests {
        add_header Content-Type "application/json" always;
        add_header Retry-After  "60"               always;
        return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Max 100 requests per minute.","retry_after":60}';
    }

    error_page 502 503 504 @upstream_error;
    location @upstream_error {
        add_header Content-Type "application/json" always;
        return 502 '{"error":"Bad Gateway","message":"The upstream service is temporarily unavailable. Please try again shortly."}';
    }

    error_page 404 @not_found;
    location @not_found {
        add_header Content-Type "application/json" always;
        return 404 '{"error":"Not Found","message":"The requested resource does not exist."}';
    }
}
