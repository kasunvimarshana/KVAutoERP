server {
    listen 80;
    listen [::]:80;

    server_name _;

    root /var/www/html/public;
    index index.php;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "SAMEORIGIN"       always;
    add_header X-XSS-Protection        "1; mode=block"    always;
    add_header Referrer-Policy         "strict-origin"    always;
    add_header Permissions-Policy      "geolocation=()"   always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain application/json application/javascript text/css;

    # Max body size for API payloads
    client_max_body_size 10m;

    # Health probe — bypass PHP for ultra-fast liveness checks
    location = /up {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Route all requests through Laravel's front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM handler
    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_pass   auth-service-fpm:9000;
        fastcgi_index  index.php;

        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT   $realpath_root;

        # Timeouts for long-running Passport key generation, etc.
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout    120s;
        fastcgi_read_timeout    120s;

        fastcgi_buffer_size          128k;
        fastcgi_buffers              4 256k;
        fastcgi_busy_buffers_size    256k;
    }

    # Deny direct PHP file access anywhere outside /public
    location ~* ^.+\.php$ {
        deny all;
    }

    # Static asset caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Logging
    error_log  /var/log/nginx/auth-service-error.log warn;
    access_log /var/log/nginx/auth-service-access.log combined;
}
