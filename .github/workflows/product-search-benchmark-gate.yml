name: Product Search Benchmark Gate

on:
  workflow_dispatch:
    inputs:
      tenant_id:
        description: "Tenant ID for benchmark run"
        required: true
        type: string
      warehouse_id:
        description: "Warehouse ID for benchmark run"
        required: true
        type: string
      terms:
        description: "Comma-separated search terms"
        required: true
        default: "SKU-001,BARCODE-001,PRODUCT-NAME"
        type: string
      iterations:
        description: "Iterations per term"
        required: true
        default: "5"
        type: string
      per_page:
        description: "Per-page size"
        required: true
        default: "25"
        type: string
      baseline_file:
        description: "Path to baseline JSON file"
        required: true
        default: "docs/benchmarks/product-search-baseline.example.json"
        type: string
      p95_regression_threshold_pct:
        description: "Allowed p95 increase percentage"
        required: true
        default: "20"
        type: string
      max_regression_threshold_pct:
        description: "Allowed max increase percentage"
        required: true
        default: "30"
        type: string
  push:
    branches:
      - "release/**"
    paths:
      - "app/Modules/Product/**"
      - "docs/benchmarks/**"
      - ".github/workflows/product-search-benchmark-gate.yml"

jobs:
  benchmark-gate:
    runs-on: ubuntu-latest
    env:
      INPUT_TENANT_ID: ${{ github.event.inputs.tenant_id }}
      INPUT_WAREHOUSE_ID: ${{ github.event.inputs.warehouse_id }}
      INPUT_TERMS: ${{ github.event.inputs.terms }}
      INPUT_ITERATIONS: ${{ github.event.inputs.iterations }}
      INPUT_PER_PAGE: ${{ github.event.inputs.per_page }}
      INPUT_BASELINE_FILE: ${{ github.event.inputs.baseline_file }}
      INPUT_P95_THRESHOLD: ${{ github.event.inputs.p95_regression_threshold_pct }}
      INPUT_MAX_THRESHOLD: ${{ github.event.inputs.max_regression_threshold_pct }}
      VAR_BENCHMARK_TENANT_ID: ${{ vars.BENCHMARK_TENANT_ID }}
      VAR_BENCHMARK_WAREHOUSE_ID: ${{ vars.BENCHMARK_WAREHOUSE_ID }}
      VAR_BENCHMARK_TERMS: ${{ vars.BENCHMARK_TERMS }}
      VAR_BENCHMARK_ITERATIONS: ${{ vars.BENCHMARK_ITERATIONS }}
      VAR_BENCHMARK_PER_PAGE: ${{ vars.BENCHMARK_PER_PAGE }}
      VAR_BENCHMARK_BASELINE_FILE: ${{ vars.BENCHMARK_BASELINE_FILE }}
      VAR_BENCHMARK_P95_THRESHOLD: ${{ vars.BENCHMARK_P95_THRESHOLD }}
      VAR_BENCHMARK_MAX_THRESHOLD: ${{ vars.BENCHMARK_MAX_THRESHOLD }}
      VAR_BENCHMARK_ARTIFACT_RETENTION_DAYS: ${{ vars.BENCHMARK_ARTIFACT_RETENTION_DAYS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, pdo, pdo_mysql, pdo_pgsql, sqlite3
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare app key
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Resolve benchmark runtime parameters
        run: |
          TENANT_ID="${INPUT_TENANT_ID:-$VAR_BENCHMARK_TENANT_ID}"
          WAREHOUSE_ID="${INPUT_WAREHOUSE_ID:-$VAR_BENCHMARK_WAREHOUSE_ID}"
          TERMS="${INPUT_TERMS:-$VAR_BENCHMARK_TERMS}"
          ITERATIONS="${INPUT_ITERATIONS:-$VAR_BENCHMARK_ITERATIONS}"
          PER_PAGE="${INPUT_PER_PAGE:-$VAR_BENCHMARK_PER_PAGE}"
          BASELINE_FILE="${INPUT_BASELINE_FILE:-$VAR_BENCHMARK_BASELINE_FILE}"
          P95_THRESHOLD="${INPUT_P95_THRESHOLD:-$VAR_BENCHMARK_P95_THRESHOLD}"
          MAX_THRESHOLD="${INPUT_MAX_THRESHOLD:-$VAR_BENCHMARK_MAX_THRESHOLD}"
          ARTIFACT_RETENTION_DAYS="$VAR_BENCHMARK_ARTIFACT_RETENTION_DAYS"

          if [ -z "$TERMS" ]; then
            TERMS="SKU-001,BARCODE-001,PRODUCT-NAME"
          fi

          if [ -z "$ITERATIONS" ]; then
            ITERATIONS="5"
          fi

          if [ -z "$PER_PAGE" ]; then
            PER_PAGE="25"
          fi

          if [ -z "$BASELINE_FILE" ]; then
            BASELINE_FILE="docs/benchmarks/product-search-baseline.staging.example.json"
          fi

          if [ -z "$P95_THRESHOLD" ]; then
            P95_THRESHOLD="20"
          fi

          if [ -z "$MAX_THRESHOLD" ]; then
            MAX_THRESHOLD="30"
          fi

          if [ -z "$ARTIFACT_RETENTION_DAYS" ]; then
            ARTIFACT_RETENTION_DAYS="30"
          fi

          if [ -z "$TENANT_ID" ] || [ -z "$WAREHOUSE_ID" ]; then
            echo "Missing benchmark runtime identifiers." >&2
            echo "Set BENCHMARK_TENANT_ID and BENCHMARK_WAREHOUSE_ID as repository variables for release branch automation, or provide workflow_dispatch inputs." >&2
            exit 1
          fi

          echo "TENANT_ID=$TENANT_ID" >> $GITHUB_ENV
          echo "WAREHOUSE_ID=$WAREHOUSE_ID" >> $GITHUB_ENV
          echo "TERMS=$TERMS" >> $GITHUB_ENV
          echo "ITERATIONS=$ITERATIONS" >> $GITHUB_ENV
          echo "PER_PAGE=$PER_PAGE" >> $GITHUB_ENV
          echo "BASELINE_FILE=$BASELINE_FILE" >> $GITHUB_ENV
          echo "P95_THRESHOLD=$P95_THRESHOLD" >> $GITHUB_ENV
          echo "MAX_THRESHOLD=$MAX_THRESHOLD" >> $GITHUB_ENV
          echo "ARTIFACT_RETENTION_DAYS=$ARTIFACT_RETENTION_DAYS" >> $GITHUB_ENV

          echo "Resolved benchmark parameters:"
          echo "- tenant_id=$TENANT_ID"
          echo "- warehouse_id=$WAREHOUSE_ID"
          echo "- terms=$TERMS"
          echo "- iterations=$ITERATIONS"
          echo "- per_page=$PER_PAGE"
          echo "- baseline_file=$BASELINE_FILE"
          echo "- p95_threshold=$P95_THRESHOLD"
          echo "- max_threshold=$MAX_THRESHOLD"
          echo "- artifact_retention_days=$ARTIFACT_RETENTION_DAYS"

      - name: Run JSON benchmark
        env:
          DB_CONNECTION: ${{ secrets.DB_CONNECTION }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_URL: ${{ secrets.DB_URL }}
        run: |
          IFS=',' read -ra TERM_LIST <<< "$TERMS"
          TERM_ARGS=""
          for term in "${TERM_LIST[@]}"; do
            CLEANED=$(echo "$term" | xargs)
            TERM_ARGS+=" --term=${CLEANED}"
          done

          php artisan product:benchmark-search \
            --format=json \
            --tenant_id="$TENANT_ID" \
            --warehouse_id="$WAREHOUSE_ID" \
            --iterations="$ITERATIONS" \
            --per_page="$PER_PAGE" \
            --include_pricing=0 \
            ${TERM_ARGS} > current-benchmark.json

          cat current-benchmark.json

      - name: Compare with baseline and gate
        run: |
          php -r '
          $baselineFile = getenv("BASELINE_FILE") ?: "";
          $p95Threshold = (float) (getenv("P95_THRESHOLD") ?: "20");
          $maxThreshold = (float) (getenv("MAX_THRESHOLD") ?: "30");

          if (!file_exists($baselineFile)) {
              fwrite(STDERR, "Baseline file not found: {$baselineFile}\n");
              exit(1);
          }

          $current = json_decode(file_get_contents("current-benchmark.json"), true);
          $baseline = json_decode(file_get_contents($baselineFile), true);

          if (!is_array($current) || !is_array($baseline)) {
              fwrite(STDERR, "Invalid JSON format in current or baseline file.\n");
              exit(1);
          }

            copy($baselineFile, "resolved-baseline.json");

          if (($current["status"] ?? "") !== "success") {
              fwrite(STDERR, "Benchmark status is not success: " . ($current["status"] ?? "unknown") . "\n");
              fwrite(STDERR, ($current["message"] ?? "") . "\n");
              exit(1);
          }

          $baselineByTerm = [];
          foreach (($baseline["results"] ?? []) as $row) {
              if (isset($row["term"])) {
                  $baselineByTerm[(string) $row["term"]] = $row;
              }
          }

          $failed = false;
          $summary = [];

          foreach (($current["results"] ?? []) as $row) {
              $term = (string) ($row["term"] ?? "");
              if ($term === "") {
                  continue;
              }

              if (!isset($baselineByTerm[$term])) {
                  fwrite(STDERR, "Missing baseline for term: {$term}\n");
                  $failed = true;
                  continue;
              }

              $base = $baselineByTerm[$term];
              $currP95 = (float) ($row["p95_ms"] ?? 0.0);
              $currMax = (float) ($row["max_ms"] ?? 0.0);
              $baseP95 = (float) ($base["p95_ms"] ?? 0.0);
              $baseMax = (float) ($base["max_ms"] ?? 0.0);

              $deltaP95 = $baseP95 > 0 ? (($currP95 - $baseP95) / $baseP95) * 100 : 0.0;
              $deltaMax = $baseMax > 0 ? (($currMax - $baseMax) / $baseMax) * 100 : 0.0;

              $regression = ($deltaP95 > $p95Threshold) || ($deltaMax > $maxThreshold);
              if ($regression) {
                  $failed = true;
              }

              $summary[] = [
                  "term" => $term,
                  "p95_delta_pct" => round($deltaP95, 2),
                  "max_delta_pct" => round($deltaMax, 2),
                  "regression" => $regression ? "YES" : "NO",
              ];
          }

          echo "Term comparison summary:\n";
          foreach ($summary as $line) {
              echo sprintf(
                  "- %s: p95_delta=%.2f%%, max_delta=%.2f%%, regression=%s\n",
                  $line["term"],
                  $line["p95_delta_pct"],
                  $line["max_delta_pct"],
                  $line["regression"]
              );
          }

              $textSummary = "Product Search Benchmark Gate Summary\n";
              foreach ($summary as $line) {
                  $textSummary .= sprintf(
                      "- %s: p95_delta=%.2f%%, max_delta=%.2f%%, regression=%s\n",
                      $line["term"],
                      $line["p95_delta_pct"],
                      $line["max_delta_pct"],
                      $line["regression"]
                  );
              }
              file_put_contents("benchmark-comparison-summary.txt", $textSummary);

          if ($failed) {
              fwrite(STDERR, "Benchmark gate failed due to regression thresholds.\n");
              exit(1);
          }

          echo "Benchmark gate passed.\n";
          '

          - name: Upload benchmark gate artifacts
            if: always()
            uses: actions/upload-artifact@v4
            with:
              name: product-search-benchmark-gate-${{ github.run_id }}
              retention-days: ${{ vars.BENCHMARK_ARTIFACT_RETENTION_DAYS || 30 }}
              if-no-files-found: warn
              path: |
                current-benchmark.json
                benchmark-comparison-summary.txt
                resolved-baseline.json
